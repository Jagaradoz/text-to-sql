info:
  name: upload sql schema
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8000/api/database/upload
  auth: inherit

body:
  type: multipartForm
  multipartForm:
    - name: file
      value: ./example_schema.sql
      type: file

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5